services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizz-backend
    restart: always
    expose:
      - "5000"
    env_file:
      - .env.production
    networks:
      - quizz-net

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://kalite.click/api
        - NEXT_PUBLIC_WS_URL=https://kalite.click
    container_name: quizz-frontend
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - quizz-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: quizz-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nextjs
      - backend
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    networks:
      - quizz-net

networks:
  quizz-net:
    driver: bridge
