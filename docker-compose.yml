services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizz-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-quizzpassword}
      - JWT_KEY=${JWT_KEY}
      - NODE_ENV=production
      - PORT=5000
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROMNAME=${SMTP_FROMNAME:-Admin}
      - SMTP_FROMEMAIL=${SMTP_FROMEMAIL:-admin@quizz.local}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    container_name: quizz-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: quizz-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-quizzpassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-quizzpassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
