services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizz-backend
    restart: always
    expose:
      - "5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_KEY=${JWT_KEY}
      - NODE_ENV=production
      - PORT=5000
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROMNAME=${SMTP_FROMNAME:-Admin}
      - SMTP_FROMEMAIL=${SMTP_FROMEMAIL:-admin@quizz.local}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    networks:
      - quizz-net

  # Next.js app (named "nextjs" để nginx upstream trỏ đúng)
  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    container_name: quizz-frontend
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - quizz-net

  # Nginx reverse proxy — cổng duy nhất ra ngoài internet
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: quizz-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - nextjs
      - backend
    networks:
      - quizz-net

networks:
  quizz-net:
    driver: bridge
